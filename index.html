<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saku</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00A94F;
  --gd: #007A38;
  --gl: #E8F7EE;
  --gm: #C3E8D1;
  --r: #EF4444;
  --rl: #FEF2F2;
  --a: #F59E0B;
  --bg: #F2F5F3;
  --card: #FFFFFF;
  --t1: #111C16;
  --t2: #4A6555;
  --t3: #9BB5A4;
  --line: #E2EDE7;
  --sh: 0 1px 3px rgba(0,60,30,.06), 0 4px 12px rgba(0,60,30,.04);
  --sh2: 0 8px 32px rgba(0,60,30,.12);
}
[data-dark] {
  --bg: #0B1610;
  --card: #122019;
  --t1: #E2F0E8;
  --t2: #5A8C6A;
  --t3: #2E5440;
  --line: #1A3025;
  --gl: #0D2318;
  --gm: #163524;
  --rl: #1F0A0A;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; font-family:'Plus Jakarta Sans', sans-serif; background:var(--bg); color:var(--t1); max-width:430px; margin:0 auto; overflow-x:hidden; }

/* ─── PIN ─── */
#pin-screen {
  position:fixed; inset:0; z-index:999;
  display:flex; flex-direction:column;
}
.pin-hero {
  flex:none; height:42%;
  background:linear-gradient(170deg, #00C45A 0%, #004D25 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  padding-bottom:36px; position:relative; overflow:hidden;
}
.ph-arc {
  position:absolute; bottom:-2px; left:0; right:0; height:28px;
  background:var(--bg); border-radius:28px 28px 0 0;
}
[data-dark] .ph-arc { background:var(--bg); }
.ph-circle1 { position:absolute; top:-60px; right:-60px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,.06); }
.ph-circle2 { position:absolute; bottom:40px; left:-80px; width:200px; height:200px; border-radius:50%; background:rgba(0,0,0,.07); }
.pin-icon {
  width:72px; height:72px; border-radius:20px;
  background:rgba(255,255,255,.14); border:1.5px solid rgba(255,255,255,.28);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 8px 24px rgba(0,0,0,.18);
  margin-bottom:14px; position:relative; z-index:1;
}
.pin-name { font-size:30px; font-weight:800; color:#fff; letter-spacing:-1px; position:relative; z-index:1; }
.pin-tag { font-size:11px; color:rgba(255,255,255,.55); letter-spacing:2px; text-transform:uppercase; margin-top:-2px; position:relative; z-index:1; }

.pin-pad {
  flex:1; background:var(--bg); display:flex; flex-direction:column;
  align-items:center; padding:24px 28px 20px;
}
.pin-step { font-size:15px; font-weight:700; color:var(--t1); margin-bottom:16px; }
.pin-dots { display:flex; gap:12px; margin-bottom:24px; }
.pd {
  width:13px; height:13px; border-radius:50%;
  border:2px solid var(--line); background:transparent; transition:all .2s;
}
.pd.on { background:var(--g); border-color:var(--g); box-shadow:0 0 8px rgba(0,169,79,.4); transform:scale(1.18); }
.pd.err { background:var(--r); border-color:var(--r); animation:sh .4s; }
@keyframes sh { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }

.pin-keys { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; width:100%; max-width:280px; }
.pk {
  height:60px; border-radius:14px; border:1.5px solid var(--line);
  background:var(--card); color:var(--t1);
  font-family:'Plus Jakarta Sans',sans-serif; font-size:22px; font-weight:700;
  cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center;
  line-height:1; box-shadow:var(--sh); transition:all .1s;
}
.pk sub { font-size:7.5px; font-weight:700; color:var(--t3); letter-spacing:2px; margin-top:3px; text-transform:uppercase; }
.pk:active { background:var(--g); color:#fff; border-color:var(--g); transform:scale(.93); box-shadow:0 4px 14px rgba(0,169,79,.35); }
.pk.del { background:transparent; border-color:transparent; box-shadow:none; }
.pk.del:active { background:var(--rl); border-color:var(--r); color:var(--r); }
.pk.empty { background:transparent; border-color:transparent; pointer-events:none; box-shadow:none; }
.pin-hint { margin-top:12px; font-size:11px; color:var(--t3); background:var(--gl); padding:4px 14px; border-radius:99px; }
.pin-credit { margin-top:14px; font-size:10.5px; color:var(--t3); text-align:center; line-height:1.8; letter-spacing:.2px; }

/* ─── APP ─── */
#app { display:none; flex-direction:column; min-height:100vh; padding-bottom:72px; }

/* ─── HEADER ─── */
.hdr { background:linear-gradient(135deg, #00C45A, #005C2A); position:sticky; top:0; z-index:100; box-shadow:0 2px 16px rgba(0,120,50,.3); }
.hdr-row { display:flex; align-items:center; justify-content:space-between; padding:13px 16px 9px; }
.hdr-brand { display:flex; align-items:center; gap:9px; }
.hdr-mark { width:32px; height:32px; background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.22); border-radius:9px; display:flex; align-items:center; justify-content:center; }
.hdr-name { font-size:20px; font-weight:800; color:#fff; letter-spacing:-.8px; }
.hdr-acts { display:flex; gap:6px; }
.ha { width:32px; height:32px; border-radius:9px; background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.2); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .12s; }
.ha:active { background:rgba(255,255,255,.28); transform:scale(.91); }

.ticker-wrap { background:rgba(0,0,0,.15); overflow:hidden; padding:5px 0; }
.ticker-row { display:inline-flex; animation:tkr 28s linear infinite; white-space:nowrap; }
.ticker-row:hover { animation-play-state:paused; }
@keyframes tkr { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ti { font-size:10.5px; color:rgba(255,255,255,.88); font-weight:600; padding:0 16px; display:inline-flex; align-items:center; gap:4px; letter-spacing:.2px; }
.tdot { width:3px; height:3px; background:rgba(255,255,255,.3); border-radius:50%; }

/* ─── PAGES ─── */
.pg { display:none; padding:14px; animation:pgup .2s ease; }
.pg.on { display:block; }
@keyframes pgup { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }

/* ─── HERO CARD ─── */
.hero {
  border-radius:20px; overflow:hidden; margin-bottom:12px;
  background:linear-gradient(145deg, #00C45A 0%, #004D22 100%);
  color:#fff; padding:20px 20px 18px; position:relative;
}
.hero-blob1 { position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,.07); }
.hero-blob2 { position:absolute; bottom:-60px; left:-20px; width:160px; height:160px; border-radius:50%; background:rgba(0,0,0,.09); }
.hero-z { position:relative; z-index:1; }
.hero-eyebrow { font-size:9.5px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; opacity:.65; margin-bottom:7px; display:flex; align-items:center; gap:7px; }
.hero-eyebrow::before { content:''; width:14px; height:1.5px; background:rgba(255,255,255,.45); border-radius:99px; }
.hero-num { font-size:42px; font-weight:800; letter-spacing:-2.5px; line-height:1; margin-bottom:5px; }
.hero-num sup { font-size:16px; font-weight:700; opacity:.8; vertical-align:top; margin-top:9px; letter-spacing:0; margin-right:2px; }
.hero-msg { font-size:11.5px; opacity:.85; margin-bottom:14px; }
.hero-prog { height:4px; background:rgba(255,255,255,.18); border-radius:99px; overflow:hidden; margin-bottom:16px; }
.hero-prog-fill { height:100%; background:rgba(255,255,255,.85); border-radius:99px; transition:width .9s cubic-bezier(.22,1,.36,1); }
.hero-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.hstat { background:rgba(0,0,0,.14); border:1px solid rgba(255,255,255,.1); border-radius:10px; padding:9px 4px; text-align:center; }
.hstat-v { font-size:13px; font-weight:800; letter-spacing:-.3px; }
.hstat-l { font-size:8px; opacity:.6; margin-top:2px; text-transform:uppercase; letter-spacing:.7px; }

/* ─── CYCLE CARD ─── */
.ccard { background:var(--card); border-radius:16px; border:1px solid var(--line); box-shadow:var(--sh); padding:14px 15px; margin-bottom:12px; }
.ccard-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:11px; }
.ccard-ttl { font-size:13px; font-weight:700; color:var(--t1); }
.ccard-badge { font-size:10px; font-weight:700; background:var(--gl); color:var(--g); padding:3px 9px; border-radius:99px; }
.ccard-row { display:flex; justify-content:space-between; margin-bottom:8px; }
.ccard-lbl { font-size:11.5px; color:var(--t2); }
.ccard-val { font-size:12.5px; font-weight:700; color:var(--t1); }
.cprog { height:6px; background:var(--gm); border-radius:99px; overflow:hidden; }
.cprog-fill { height:100%; background:linear-gradient(90deg,var(--g),var(--gd)); border-radius:99px; transition:width .9s cubic-bezier(.22,1,.36,1); }
.ccard-foot { font-size:10.5px; color:var(--t3); margin-top:8px; }

/* ─── SECTION HEADER ─── */
.srow { display:flex; justify-content:space-between; align-items:center; margin-bottom:9px; }
.sttl { font-size:13.5px; font-weight:800; color:var(--t1); }
.slink { font-size:11.5px; color:var(--g); font-weight:700; cursor:pointer; }

/* ─── TX CARD ─── */
.txlist { display:flex; flex-direction:column; gap:7px; }
.txcard {
  background:var(--card); border-radius:14px; border:1px solid var(--line);
  box-shadow:var(--sh); overflow:hidden; display:flex;
  transition:transform .1s;
}
.txcard:active { transform:scale(.984); }
.tx-stripe { width:3.5px; flex-shrink:0; }
.tx-inner { display:flex; align-items:center; gap:10px; flex:1; padding:11px 12px 11px 10px; }
.tx-emo { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.tx-info { flex:1; min-width:0; }
.tx-name { font-size:13.5px; font-weight:700; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta { display:flex; align-items:center; gap:5px; margin-top:2px; }
.tx-tag { font-size:9.5px; font-weight:700; padding:2px 7px; border-radius:99px; }
.tx-time { font-size:10px; color:var(--t3); }
.tx-amt { font-size:14px; font-weight:800; color:var(--r); flex-shrink:0; }

/* category tokens */
.cat-makan    { --cc:#D97706; --ce:#FEF3C7; }
.cat-transport{ --cc:#2563EB; --ce:#DBEAFE; }
.cat-belanja  { --cc:#DB2777; --ce:#FCE7F3; }
.cat-hiburan  { --cc:#7C3AED; --ce:#EDE9FE; }
.cat-kesehatan{ --cc:#059669; --ce:#D1FAE5; }
.cat-lainnya  { --cc:#6B7280; --ce:#F3F4F6; }
.tx-stripe { background:var(--cc); }
.tx-emo    { background:var(--ce); }
.tx-tag    { background:color-mix(in srgb,var(--cc) 12%,transparent); color:var(--cc); }

/* ─── EMPTY ─── */
.empty { text-align:center; padding:36px 20px; color:var(--t2); }
.empty-ico { font-size:40px; margin-bottom:10px; }
.empty p { font-size:13px; line-height:1.7; }

/* ─── RIWAYAT ─── */
.chips { display:flex; gap:6px; margin-bottom:13px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
.chips::-webkit-scrollbar { display:none; }
.chip { padding:6px 13px; border-radius:99px; border:1.5px solid var(--line); background:var(--card); font-size:12px; font-weight:600; color:var(--t2); cursor:pointer; white-space:nowrap; transition:all .15s; }
.chip.on { background:var(--g); border-color:var(--g); color:#fff; }

.dgrp { margin-bottom:16px; }
.dhd {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 10px; margin-bottom:8px; border-radius:8px;
  background:linear-gradient(90deg,var(--gl),transparent);
  border-left:3px solid var(--g);
}
.dlbl { font-size:10.5px; font-weight:700; color:var(--g); text-transform:uppercase; letter-spacing:1px; }
.dtot { font-size:12px; font-weight:800; color:var(--r); }

/* ─── CHARTS ─── */
.chcard { background:var(--card); border-radius:16px; border:1px solid var(--line); box-shadow:var(--sh); padding:15px; margin-bottom:12px; }
.chttl { font-size:13px; font-weight:700; color:var(--t1); margin-bottom:14px; }
.bars { display:flex; align-items:flex-end; gap:5px; height:110px; }
.bcol { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; height:100%; justify-content:flex-end; }
.bbar { width:100%; border-radius:6px 6px 0 0; min-height:4px; transition:height .7s cubic-bezier(.22,1,.36,1); }
.bbar.ok   { background:linear-gradient(180deg,#00C45A,#006B2E); }
.bbar.warn { background:linear-gradient(180deg,#F59E0B,#B45309); }
.bbar.over { background:linear-gradient(180deg,#EF4444,#991B1B); }
.blbl { font-size:9px; color:var(--t3); font-weight:600; }
.bamt { font-size:8px; color:var(--t3); }
.pie-wrap { display:flex; gap:14px; align-items:center; }
.pie-leg  { flex:1; display:flex; flex-direction:column; gap:7px; }
.pie-li   { display:flex; align-items:center; gap:7px; }
.pie-dot  { width:8px; height:8px; border-radius:3px; flex-shrink:0; }
.pie-lbl  { font-size:11.5px; color:var(--t2); flex:1; }
.pie-val  { font-size:12px; font-weight:800; color:var(--t1); }

/* ─── SETTINGS ─── */
.set-sec { margin-bottom:16px; }
.set-lbl { font-size:9.5px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:6px; padding-left:2px; }
.set-card { background:var(--card); border-radius:16px; border:1px solid var(--line); box-shadow:var(--sh); overflow:hidden; }
.srow2 { display:flex; align-items:center; gap:11px; padding:13px 14px; border-bottom:1px solid var(--line); cursor:pointer; transition:background .12s; }
.srow2:last-child { border-bottom:none; }
.srow2:active { background:var(--bg); }
.sico { width:32px; height:32px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.sttl2 { font-size:13.5px; font-weight:600; color:var(--t1); }
.ssub  { font-size:11px; color:var(--t3); margin-top:1px; }
.sarr  { color:var(--t3); flex-shrink:0; }
.tgl { width:42px; height:24px; border-radius:99px; background:var(--line); position:relative; cursor:pointer; transition:background .25s; border:none; flex-shrink:0; }
.tgl.on { background:var(--g); }
.tgl::after { content:''; position:absolute; width:18px; height:18px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left .25s; box-shadow:0 1px 3px rgba(0,0,0,.18); }
.tgl.on::after { left:21px; }
.logout-btn { width:100%; padding:13px; background:var(--rl); border:1.5px solid var(--r); border-radius:13px; color:var(--r); font-family:'Plus Jakarta Sans',sans-serif; font-size:13.5px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:7px; margin-top:6px; transition:all .12s; }
.logout-btn:active { background:var(--r); color:#fff; }
.footer-txt { text-align:center; padding:18px 0 4px; font-size:11px; color:var(--t3); line-height:2; }

/* ─── NAV ─── */
.bnav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--card); border-top:1px solid var(--line); display:flex; z-index:100; box-shadow:0 -2px 20px rgba(0,60,30,.09); padding-bottom:env(safe-area-inset-bottom,0); }
.ni { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px 0 9px; gap:2px; cursor:pointer; border:none; background:none; color:var(--t3); transition:color .15s; }
.ni.on { color:var(--g); }
.ni-box { width:36px; height:26px; border-radius:9px; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.ni.on .ni-box { background:var(--gl); }
.ni-lbl { font-size:9.5px; font-weight:700; letter-spacing:.2px; }

/* ─── FAB ─── */
.fab { position:fixed; bottom:84px; right:16px; width:50px; height:50px; background:linear-gradient(135deg,#00C45A,#006B2E); border:none; border-radius:14px; display:none; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 18px rgba(0,169,79,.5); z-index:90; transition:transform .12s; }
.fab:active { transform:scale(.9); }

/* ─── SHEET ─── */
.ovl { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; opacity:0; pointer-events:none; transition:opacity .3s; backdrop-filter:blur(3px); }
.ovl.on { opacity:1; pointer-events:all; }
.sht { position:fixed; bottom:0; left:50%; transform:translateX(-50%) translateY(102%); width:100%; max-width:430px; background:var(--card); border-radius:24px 24px 0 0; z-index:201; padding:0 16px 32px; max-height:90vh; overflow-y:auto; transition:transform .36s cubic-bezier(.32,.72,0,1); }
.sht.on { transform:translateX(-50%) translateY(0); }
.sht-bar { width:32px; height:4px; background:var(--line); border-radius:99px; margin:12px auto 18px; }
.sht-ttl { font-size:17px; font-weight:800; color:var(--t1); margin-bottom:16px; }
.fg { margin-bottom:13px; }
.fl { font-size:10px; font-weight:700; color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; display:block; }
.fi { width:100%; padding:12px 13px; background:var(--bg); border:1.5px solid var(--line); border-radius:12px; font-size:16px; color:var(--t1); font-family:'Plus Jakarta Sans',sans-serif; outline:none; transition:border-color .2s; }
.fi:focus { border-color:var(--g); }
.fi::placeholder { color:var(--t3); }
.catg { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
.cb { padding:10px 5px; border-radius:12px; border:1.5px solid var(--line); background:var(--bg); cursor:pointer; text-align:center; transition:all .12s; }
.cb.on { border-color:var(--g); background:var(--gl); }
.cb-e { font-size:20px; display:block; margin-bottom:3px; }
.cb-n { font-size:10.5px; color:var(--t2); font-weight:600; }
.cb.on .cb-n { color:var(--g); }
.sbtn { width:100%; padding:14px; background:linear-gradient(135deg,#00C45A,#005C28); color:#fff; border:none; border-radius:12px; font-size:14.5px; font-weight:700; font-family:'Plus Jakarta Sans',sans-serif; cursor:pointer; margin-top:8px; box-shadow:0 4px 14px rgba(0,169,79,.4); transition:opacity .12s; }
.sbtn:active { opacity:.84; }

/* ─── DIALOGS ─── */
.dov { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:300; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .2s; backdrop-filter:blur(4px); }
.dov.on { opacity:1; pointer-events:all; }
.dbox { background:var(--card); border-radius:18px; padding:22px; width:100%; max-width:300px; box-shadow:var(--sh2); transform:scale(.93); transition:transform .2s; }
.dov.on .dbox { transform:scale(1); }
.dico { font-size:34px; text-align:center; margin-bottom:9px; }
.dttl { font-size:16px; font-weight:800; text-align:center; margin-bottom:6px; }
.dbdy { font-size:12.5px; color:var(--t2); text-align:center; line-height:1.65; margin-bottom:16px; }
.dbtns { display:flex; gap:8px; }
.dbtn { flex:1; padding:11px; border-radius:11px; border:1.5px solid var(--line); background:var(--bg); font-size:13px; font-weight:700; cursor:pointer; color:var(--t1); font-family:'Plus Jakarta Sans',sans-serif; transition:all .12s; }
.dbtn.red { background:var(--r); border-color:var(--r); color:#fff; }
.dbtn:active { opacity:.8; }

/* pin modal */
.pmd { width:12px; height:12px; border-radius:50%; border:1.5px solid var(--line); background:transparent; transition:all .2s; }
.pmd.on { background:var(--g); border-color:var(--g); box-shadow:0 0 7px rgba(0,169,79,.4); }
.pmd.err { background:var(--r); border-color:var(--r); animation:sh .4s; }
.pmk { height:48px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--t1); font-family:'Plus Jakarta Sans',sans-serif; font-size:19px; font-weight:700; cursor:pointer; transition:all .12s; }
.pmk:active { background:var(--g); color:#fff; border-color:var(--g); }

/* ─── TOAST ─── */
.toast { position:fixed; bottom:86px; left:50%; transform:translateX(-50%) translateY(12px); background:#071F0E; color:#A8F0C0; padding:9px 18px; border-radius:99px; font-size:12px; font-weight:700; z-index:400; opacity:0; transition:all .25s; white-space:nowrap; pointer-events:none; border:1px solid rgba(0,169,79,.3); box-shadow:0 4px 16px rgba(0,0,0,.25); }
.toast.on { opacity:1; transform:
